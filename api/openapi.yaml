openapi: 3.1.0
info:
  title: NAPCORE Helpdesk API
  version: 1.0.0
  summary: FAQ-first plus RAG-fallback API with strict source-grounding guardrails
  description: |
    API contract for the NAPCORE Helpdesk.
    The service answers questions using FAQ-first lookup with RAG fallback,
    enforces approved GitHub repository boundaries, and returns abstention
    when evidence is insufficient.
servers:
  - url: https://api.example.org
    description: Production placeholder
  - url: http://localhost:8000
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Operations
    description: Operational health and readiness checks
  - name: QnA
    description: Question answering and orchestration
  - name: FAQOps
    description: FAQ operations and promotion candidates
  - name: Editorial
    description: Editorial workflow integrations
paths:
  /api/v1/health/live:
    get:
      tags: [Operations]
      summary: Liveness probe
      operationId: healthLive
      security: []
      responses:
        '200':
          description: Service process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          description: Probe rate limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/health/ready:
    get:
      tags: [Operations]
      summary: Readiness probe
      operationId: healthReady
      security: []
      responses:
        '200':
          description: Service dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          description: Probe rate limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Dependency unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/questions/answer:
    post:
      tags: [QnA]
      summary: Answer question with FAQ-first and RAG fallback
      operationId: answerQuestion
      parameters:
        - name: X-Request-Id
          in: header
          required: true
          description: Request correlation identifier
          schema:
            type: string
            minLength: 1
        - name: X-User-Id
          in: header
          required: false
          schema:
            type: string
        - name: X-Session-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerRequest'
            examples:
              default:
                value:
                  question: How to use NeTEx for exchanging a timetable?
                  sessionId: sess-123
                  userId: user-42
                  standardsScope: [NeTEx, SIRI]
                  language: en
                  options:
                    maxCitations: 5
                    allowAbstain: true
                    faqMinConfidence: 0.85
                    retrievalTopK: 6
                    retrievalMinScore: 0.62
                    graphRagEnabled: false
      responses:
        '200':
          description: Answer produced in faq, rag, or abstain mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerResponse'
              examples:
                faq:
                  value:
                    answerId: ans-001
                    mode: faq
                    confidence: 0.93
                    answer: Start with the relevant timetable frame.
                    citations:
                      - repositoryUrl: https://github.com/NeTEx-CEN/NeTEx
                        commitSha: abc1234
                        sourcePath: docs/timetable-guide.md
                        chunkId: c-001
                        label: Timetable overview
                    abstained: false
                    abstentionReason: null
                    reviewRequired: false
                    trace:
                      requestId: req-001
                      questionEventId: qe-001
                      matchedFaqEntryId: faq-001
                      retrievalEventIds: []
                      graphExpansionHops: 0
                      graphConceptIds: []
                      graphEvidenceCount: 0
                      graphScoreContribution: 0.0
                rag:
                  value:
                    answerId: ans-002
                    mode: rag
                    confidence: 0.77
                    answer: For timetable exchange, start by defining service and timetable frames.
                    citations:
                      - repositoryUrl: https://github.com/NeTEx-CEN/NeTEx
                        commitSha: abc1234
                        sourcePath: profile/part-2.xml
                        chunkId: c-067
                        label: Service frame example
                    abstained: false
                    abstentionReason: null
                    reviewRequired: true
                    trace:
                      requestId: req-002
                      questionEventId: qe-002
                      matchedFaqEntryId: null
                      retrievalEventIds: [re-991]
                      evidenceLinkIds: [el-51]
                      graphExpansionHops: 1
                      graphConceptIds: [opra:delay-statistics, opra:delayed-journey]
                      graphEvidenceCount: 1
                      graphScoreContribution: 0.09
                abstain:
                  value:
                    answerId: ans-003
                    mode: abstain
                    confidence: 0
                    answer: I do not have sufficient approved-source evidence to answer this safely.
                    citations: []
                    abstained: true
                    abstentionReason: INSUFFICIENT_EVIDENCE
                    reviewRequired: false
                    trace:
                      requestId: req-003
                      questionEventId: qe-003
                      matchedFaqEntryId: null
                      retrievalEventIds: [re-992]
                      graphExpansionHops: 0
                      graphConceptIds: []
                      graphEvidenceCount: 0
                      graphScoreContribution: 0.0
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Policy conflict (for example unsupported claims)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Valid request but cannot be answered within policy constraints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/faqs/promotion-candidates:
    get:
      tags: [FAQOps]
      summary: List FAQ promotion candidates from question telemetry
      operationId: listPromotionCandidates
      parameters:
        - name: windowDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 14
        - name: minCount
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 5
        - name: onlyUnresolved
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Promotion candidates returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionCandidatesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/editorial/queue:
    get:
      tags: [Editorial]
      summary: List editorial queue board items
      operationId: listEditorialQueue
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, review, approved, rejected, published]
        - name: reason
          in: query
          required: false
          schema:
            type: string
            enum: [LOW_CONFIDENCE, CITATION_GAP, POLICY_REVIEW, USER_ESCALATION]
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum: [low, normal, high]
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Editorial queue board items returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditorialBoardResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Editorial]
      summary: Route an answer outcome to editorial queue
      operationId: routeToEditorialQueue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditorialQueueRequest'
      responses:
        '200':
          description: Queue action accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditorialQueueResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/editorial/queue/transition:
    post:
      tags: [Editorial]
      summary: Apply an editorial workflow transition action
      operationId: transitionEditorialQueue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditorialQueueTransitionRequest'
      responses:
        '200':
          description: Transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditorialQueueTransitionResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden transition for caller roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid transition for current queue state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/editorial/queue/metrics:
    get:
      tags: [Editorial]
      summary: Return editorial board KPI metrics
      operationId: getEditorialQueueMetrics
      parameters:
        - name: windowDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 30
        - name: slaHours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 72
      responses:
        '200':
          description: Editorial queue metrics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditorialQueueMetricsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/index:
    post:
      tags: [Operations]
      summary: Trigger source repository ingestion
      operationId: indexRepository
      description: |
        Runs an ingestion pass against a locally cloned repository.
        Repository URLs are checked against the configured allow-list,
        with optional auto-add when autoAllowRepository=true.
        Requires admin or publisher role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexRepositoryRequest'
            examples:
              netex_incremental:
                value:
                  repoUrl: https://github.com/NeTEx-CEN/NeTEx
                  repoPath: /data/repos/NeTEx
                  profile: netex
                  incremental: true
                  prune: false
                  includeIssues: true
                  autoAllowRepository: true
      responses:
        '200':
          description: Ingestion completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexRepositoryResponse'
        '400':
          description: Invalid request or repo path does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Role insufficient or repository not allow-listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AnswerRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
        sessionId:
          type: string
        userId:
          type: string
        standardsScope:
          type: array
          items:
            type: string
            enum: [Transmodel, NeTEx, SIRI, OJP, OpRa, DATEX II, Profile Documentation]
        language:
          type: string
          default: en
        options:
          $ref: '#/components/schemas/AnswerOptions'
      additionalProperties: false
    HealthResponse:
      type: object
      required: [status, service, check]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        service:
          type: string
        check:
          type: string
          enum: [live, ready]
        database:
          type: string
      additionalProperties: false
    AnswerOptions:
      type: object
      properties:
        maxCitations:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
        allowAbstain:
          type: boolean
          default: true
        faqMinConfidence:
          type: number
          minimum: 0
          maximum: 1
          default: 0.85
        retrievalTopK:
          type: integer
          minimum: 1
          maximum: 20
          default: 6
        retrievalMinScore:
          type: number
          minimum: 0
          maximum: 1
          default: 0.62
        graphRagEnabled:
          type: boolean
          default: false
      additionalProperties: false
    AnswerResponse:
      type: object
      required:
        [answerId, mode, confidence, answer, citations, abstained, reviewRequired, trace]
      properties:
        answerId:
          type: string
        mode:
          type: string
          enum: [faq, rag, abstain]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        abstained:
          type: boolean
        abstentionReason:
          type: [string, "null"]
          enum:
            [INSUFFICIENT_EVIDENCE, POLICY_BLOCK, RETRIEVAL_LOW_QUALITY, UNKNOWN, null]
        reviewRequired:
          type: boolean
        trace:
          $ref: '#/components/schemas/AnswerTrace'
      additionalProperties: false
    Citation:
      type: object
      required: [repositoryUrl, commitSha, sourcePath, chunkId]
      properties:
        repositoryUrl:
          type: string
          format: uri
        commitSha:
          type: string
        sourcePath:
          type: string
        chunkId:
          type: string
        label:
          type: string
      additionalProperties: false
    AnswerTrace:
      type: object
      required:
        [requestId, questionEventId, retrievalEventIds, graphExpansionHops, graphConceptIds, graphEvidenceCount, graphScoreContribution]
      properties:
        requestId:
          type: string
        questionEventId:
          type: string
        matchedFaqEntryId:
          type: [string, "null"]
        retrievalEventIds:
          type: array
          items:
            type: string
        evidenceLinkIds:
          type: array
          items:
            type: string
        graphExpansionHops:
          type: integer
          minimum: 0
        graphConceptIds:
          type: array
          items:
            type: string
        graphEvidenceCount:
          type: integer
          minimum: 0
        graphScoreContribution:
          type: number
          minimum: 0
      additionalProperties: false
    PromotionCandidatesResponse:
      type: object
      required: [windowDays, minCount, items]
      properties:
        windowDays:
          type: integer
        minCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/PromotionCandidate'
      additionalProperties: false
    PromotionCandidate:
      type: object
      required:
        [normalizedIntent, questionCount, notHelpfulRate, lastAskedAt, recommendedAction]
      properties:
        normalizedIntent:
          type: string
        questionCount:
          type: integer
        notHelpfulRate:
          type: number
          minimum: 0
          maximum: 1
        lastAskedAt:
          type: string
          format: date-time
        recommendedAction:
          type: string
          enum: [CREATE_FAQ_DRAFT, REVIEW_EXISTING_FAQ, MONITOR]
      additionalProperties: false
    EditorialQueueRequest:
      type: object
      required: [questionEventId, reason]
      properties:
        questionEventId:
          type: string
        reason:
          type: string
          enum: [LOW_CONFIDENCE, CITATION_GAP, POLICY_REVIEW, USER_ESCALATION]
        priority:
          type: string
          enum: [low, normal, high]
          default: normal
      additionalProperties: false
    EditorialQueueResponse:
      type: object
      required: [queued, queueItemId, status]
      properties:
        queued:
          type: boolean
        queueItemId:
          type: string
        status:
          type: string
          enum: [draft, review]
      additionalProperties: false
    EditorialQueueTransitionRequest:
      type: object
      required: [queueItemId, action]
      properties:
        queueItemId:
          type: string
          format: uuid
        action:
          type: string
          enum:
            [submit_for_review, request_changes, approve, reject, publish, reopen]
        comment:
          type: string
      additionalProperties: false
    EditorialQueueTransitionResponse:
      type: object
      required: [queueItemId, status, transition]
      properties:
        queueItemId:
          type: string
        status:
          type: string
          enum: [draft, review, approved, rejected, published]
        transition:
          $ref: '#/components/schemas/EditorialTransition'
      additionalProperties: false
    EditorialTransition:
      type: object
      required: [action, fromStatus, toStatus, actorId, actorRoles]
      properties:
        action:
          type: string
          enum:
            [submit_for_review, request_changes, approve, reject, publish, reopen]
        fromStatus:
          type: string
          enum: [draft, review, approved, rejected, published]
        toStatus:
          type: string
          enum: [draft, review, approved, rejected, published]
        actorId:
          type: string
        actorRoles:
          type: array
          items:
            type: string
      additionalProperties: false
    EditorialBoardResponse:
      type: object
      required: [page, pageSize, total, actorRoles, items]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        actorRoles:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/EditorialBoardItem'
      additionalProperties: false
    EditorialBoardItem:
      type: object
      required:
        [queueItemId, status, reason, priority, questionEventId, requestId, question, createdAt, updatedAt, allowedActions]
      properties:
        queueItemId:
          type: string
        status:
          type: string
          enum: [draft, review, approved, rejected, published]
        reason:
          type: string
          enum: [LOW_CONFIDENCE, CITATION_GAP, POLICY_REVIEW, USER_ESCALATION]
        priority:
          type: string
          enum: [low, normal, high]
        questionEventId:
          type: string
        requestId:
          type: string
        question:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        allowedActions:
          type: array
          items:
            type: string
            enum:
              [submit_for_review, request_changes, approve, reject, publish, reopen]
      additionalProperties: false
    EditorialQueueMetricsResponse:
      type: object
      required:
        [windowDays, slaHours, generatedAt, totalItems, unresolvedItems, overdueItems, byStatus, byPriority, byReason, agingBuckets]
      properties:
        windowDays:
          type: integer
          minimum: 1
        slaHours:
          type: integer
          minimum: 1
        generatedAt:
          type: string
          format: date-time
        totalItems:
          type: integer
          minimum: 0
        unresolvedItems:
          type: integer
          minimum: 0
        overdueItems:
          type: integer
          minimum: 0
        byStatus:
          type: object
          required: [draft, review, approved, rejected, published]
          properties:
            draft:
              type: integer
              minimum: 0
            review:
              type: integer
              minimum: 0
            approved:
              type: integer
              minimum: 0
            rejected:
              type: integer
              minimum: 0
            published:
              type: integer
              minimum: 0
          additionalProperties: false
        byPriority:
          type: object
          required: [low, normal, high]
          properties:
            low:
              type: integer
              minimum: 0
            normal:
              type: integer
              minimum: 0
            high:
              type: integer
              minimum: 0
          additionalProperties: false
        byReason:
          type: object
          required: [LOW_CONFIDENCE, CITATION_GAP, POLICY_REVIEW, USER_ESCALATION]
          properties:
            LOW_CONFIDENCE:
              type: integer
              minimum: 0
            CITATION_GAP:
              type: integer
              minimum: 0
            POLICY_REVIEW:
              type: integer
              minimum: 0
            USER_ESCALATION:
              type: integer
              minimum: 0
          additionalProperties: false
        agingBuckets:
          type: object
          required: [lt24h, h24to72, gt72h]
          properties:
            lt24h:
              type: integer
              minimum: 0
            h24to72:
              type: integer
              minimum: 0
            gt72h:
              type: integer
              minimum: 0
          additionalProperties: false
      additionalProperties: false
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
          additionalProperties: false
      additionalProperties: false
    IndexRepositoryRequest:
      type: object
      required: [repoUrl, repoPath]
      properties:
        repoUrl:
          type: string
          format: uri
          description: Approved repository URL (must be in ALLOWED_SOURCE_REPOSITORIES)
        repoPath:
          type: string
          description: Absolute local filesystem path to an already-cloned repository
        profile:
          type: string
          default: default
          description: Index profile name (corresponds to index_profiles/<profile>.yaml)
        incremental:
          type: boolean
          default: true
          description: Skip files whose per-file content hash is unchanged
        prune:
          type: boolean
          default: false
          description: Delete chunks for files no longer present in the repository
        includeIssues:
          type: boolean
          default: false
          description: Fetch and index GitHub issues/comments in addition to repository files
        autoAllowRepository:
          type: boolean
          default: true
          description: Add unknown repository URL to in-process allow-list before indexing
      additionalProperties: false
    IndexRepositoryResponse:
      type: object
      required: [status, requestId, repositoryUrl, repositoryPath, profile, incremental, prune, autoAllowedRepository, scannedFiles, skippedFiles, createdChunks, updatedChunks, deletedChunks]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        repositoryUrl:
          type: string
          format: uri
        repositoryPath:
          type: string
        profile:
          type: string
        incremental:
          type: boolean
        prune:
          type: boolean
        autoAllowedRepository:
          type: boolean
        scannedFiles:
          type: integer
          minimum: 0
        skippedFiles:
          type: integer
          minimum: 0
        createdChunks:
          type: integer
          minimum: 0
        updatedChunks:
          type: integer
          minimum: 0
        deletedChunks:
          type: integer
          minimum: 0
      additionalProperties: false
