name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true

permissions:
  contents: read

jobs:
  guard:
    name: Confirm deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Deployment not confirmed. Type 'deploy' to proceed."
            exit 1
          fi

  ci:
    name: CI must pass
    needs: guard
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.PROD_SSH_KEY }}" > /tmp/deploy_key

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
              "bash -eux /opt/napcore-helpdesk/scripts/deploy.sh"

          rm -f /tmp/deploy_key
