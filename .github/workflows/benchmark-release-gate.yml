name: Benchmark Release Gate

on:
  workflow_dispatch:
    inputs:
      baseline_file:
        description: 'Baseline JSON file path'
        required: false
        default: 'docs/testing/benchmark-graphrag-ab-2026-05-11.json'

jobs:
  full-benchmark:
    name: Full Benchmark (Release Gate)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16-v0.5.1
        env:
          POSTGRES_DB: napcore_helpdesk_test
          POSTGRES_USER: napcore
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Django database
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DATABASE_URL: postgresql://napcore:test_password@localhost:5432/napcore_helpdesk_test
          DJANGO_USE_SQLITE: 'False'
          GRAPHDB_ENABLED: 'False'
          LLM_ENABLED: 'False'
        run: |
          ../.venv/bin/python manage.py migrate --noinput 2>&1 | head -20

      - name: Run full benchmark
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DATABASE_URL: postgresql://napcore:test_password@localhost:5432/napcore_helpdesk_test
          DJANGO_USE_SQLITE: 'False'
          GRAPHDB_ENABLED: 'False'
          LLM_ENABLED: 'False'
        run: |
          ../.venv/bin/python manage.py benchmark_full \
            --exit-code-on-fail \
            --baseline-file ../${{ github.event.inputs.baseline_file || 'docs/testing/benchmark-graphrag-ab-2026-05-11.json' }} \
            --output ./benchmark-full-release-gate.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: full-benchmark-results
          path: backend/benchmark-full-release-gate.json

      - name: Generate release summary
        if: always()
        run: |
          python3 << 'EOF'
          import json
          with open('./backend/benchmark-full-release-gate.json', 'r') as f:
              results = json.load(f)
          
          summary = results['summary']
          status = 'PASS' if len(summary['gates_failed']) == 0 else 'FAIL'
          
          print(f"Release Gate Status: {status}")
          print(f"Questions: {summary['question_count_ok']}/{summary['question_count_total']}")
          print(f"Avg Latency: {summary['global_stats']['graph_avg_ms']:.1f} ms")
          print(f"P95 Latency: {summary['global_stats']['graph_p95_ms']:.1f} ms")
          print()
          if summary['gates_failed']:
              print("FAILED GATES:")
              for gate in summary['gates_failed']:
                  print(f"  - {gate}")
          else:
              print("ALL GATES PASSED ✅")
          
          with open('release-summary.txt', 'w') as f:
              f.write(f"Status: {status}\n")
              f.write(f"Questions: {summary['question_count_ok']}/{summary['question_count_total']}\n")
              f.write(f"Avg Latency: {summary['global_stats']['graph_avg_ms']:.1f} ms\n")
              f.write(f"P95 Latency: {summary['global_stats']['graph_p95_ms']:.1f} ms\n")
          EOF

      - name: Upload release summary
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: release-summary
          path: release-summary.txt

      - name: Comment release PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('./release-summary.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Release Gate Benchmark\n\n\`\`\`\n${summary}\n\`\`\``
            });

      - name: Fail if gates failed
        if: failure()
        run: exit 1
