name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_USE_SQLITE: "True"
      DJANGO_SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-bytes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test -v 1

  openapi-contract:
    name: OpenAPI Contract Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Validate OpenAPI
        run: bash scripts/validate-openapi.sh api/openapi.yaml

  docs-c4-build:
    name: C4 Diagrams Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlantUML and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Build C4 diagrams
        run: make diagrams-c4

      - name: Verify rendered diagrams exist
        run: |
          test -f docs/architecture/c4-system-context.svg
          test -f docs/architecture/c4-container.svg
          test -f docs/architecture/c4-orchestrator-components.svg
