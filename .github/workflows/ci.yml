name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  backend-quality:
    name: Backend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-bytes
      POSTGRES_DB: napcore_helpdesk
      POSTGRES_USER: napcore
      POSTGRES_PASSWORD: napcore
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: napcore_helpdesk
          POSTGRES_USER: napcore
          POSTGRES_PASSWORD: napcore
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U napcore -d napcore_helpdesk"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if PGPASSWORD="$POSTGRES_PASSWORD" psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT 1" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time" >&2
          exit 1

      - name: Django check
        run: python manage.py check

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test -v 1

  backend-postgres-integration:
    name: Backend PostgreSQL Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-bytes
      POSTGRES_DB: napcore_helpdesk
      POSTGRES_USER: napcore
      POSTGRES_PASSWORD: napcore
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: napcore_helpdesk
          POSTGRES_USER: napcore
          POSTGRES_PASSWORD: napcore
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U napcore -d napcore_helpdesk"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if PGPASSWORD="$POSTGRES_PASSWORD" psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT 1" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time" >&2
          exit 1

      - name: Django check
        run: python manage.py check

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Verify pgvector extension
        env:
          PGPASSWORD: napcore
        run: |
          psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT extname FROM pg_extension WHERE extname='vector'" | grep -q vector

      - name: Run tests on PostgreSQL
        run: python manage.py test -v 1

  openapi-contract:
    name: OpenAPI Contract Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Validate OpenAPI
        run: bash scripts/validate-openapi.sh api/openapi.yaml

  docs-c4-build:
    name: C4 Diagrams Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlantUML and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Build C4 diagrams
        run: make diagrams-c4

      - name: Verify rendered diagrams exist
        run: |
          test -f docs/architecture/c4-system-context.svg
          test -f docs/architecture/c4-container.svg
          test -f docs/architecture/c4-orchestrator-components.svg
