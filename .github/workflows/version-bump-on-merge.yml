name: Version Bump On Merge

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'chore(version): bump to')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Determine bump level
        id: bump_level
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((l) => l.name);
            let bump = "patch";
            if (labels.includes("version:major")) {
              bump = "major";
            } else if (labels.includes("version:minor")) {
              bump = "minor";
            } else if (labels.includes("version:patch")) {
              bump = "patch";
            }

            core.setOutput("bump", bump);
            core.setOutput("labels", labels.join(", ") || "none");

      - name: Bump VERSION
        id: bump_version
        env:
          BUMP: ${{ steps.bump_level.outputs.bump }}
        run: |
          set -euo pipefail

          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing" >&2
            exit 1
          fi

          raw="$(tr -d '[:space:]' < VERSION)"
          base="${raw%%+*}"
          base="${base%%-*}"

          IFS='.' read -r major minor patch <<< "$base"
          if [[ ! "$major" =~ ^[0-9]+$ || ! "$minor" =~ ^[0-9]+$ || ! "$patch" =~ ^[0-9]+$ ]]; then
            echo "Unsupported VERSION format: $raw" >&2
            exit 1
          fi

          case "$BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump level: $BUMP" >&2
              exit 1
              ;;
          esac

          new_version="$major.$minor.$patch"
          echo "$new_version" > VERSION
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Create VERSION bump pull request
        id: create_pr
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
          BUMP: ${{ steps.bump_level.outputs.bump }}
          LABELS: ${{ steps.bump_level.outputs.labels }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(version): bump to ${{ steps.bump_version.outputs.new_version }} (${{ steps.bump_level.outputs.bump }})"
          title: "chore(version): bump to ${{ steps.bump_version.outputs.new_version }} (${{ steps.bump_level.outputs.bump }})"
          body: |
            ## Automated version bump
            - Triggered by merged PR #${{ github.event.pull_request.number }}
            - Source PR labels: ${{ steps.bump_level.outputs.labels }}
            - Applied bump: ${{ steps.bump_level.outputs.bump }}
            - New VERSION: ${{ steps.bump_version.outputs.new_version }}
          base: main
          branch: chore/version-bump-${{ steps.bump_version.outputs.new_version }}
          delete-branch: true
          add-paths: |
            VERSION

      - name: Workflow summary
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
          BUMP: ${{ steps.bump_level.outputs.bump }}
          LABELS: ${{ steps.bump_level.outputs.labels }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
        run: |
          {
            echo "## Version Bump"
            echo "- PR labels: $LABELS"
            echo "- Applied bump: $BUMP"
            echo "- New VERSION: $NEW_VERSION"
            if [[ -n "${PR_URL:-}" ]]; then
              echo "- Opened bump PR: $PR_URL"
            else
              echo "- No bump PR opened (likely no VERSION diff)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
