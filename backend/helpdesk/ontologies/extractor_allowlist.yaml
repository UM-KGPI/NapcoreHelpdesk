# Ontology extraction configuration for XSD importer.
# Domain experts can tune this file without touching Python code.

allowlist_exact:
  netex:
    - GroupOfLines
    - Network
    - DestinationDisplay
    - DestinationDisplayVariant
    - AllowedLineDirection
    - TypeOfLine
  opra:
    - LateDatedVehicleJourneyCount
    - CancelledDatedVehicleJourneyCount
    - PlannedCapacity
    - ActualCapacity
    - CapacitySpecification
    - VehicleTypeCapacity
    - PlannedServiceIntensity
    - ActualServiceIntensity
    - ExpectedServiceIntensity
    - MeanCapacityOverNetworkDistance
    - MeanCapacityOverRouteDistance
    - MeanCapacityOverJourneyDistance
    - LoadOverJourneyDistance
    - TransportPerformance
    - TransportPerformancePerVehicle
    - AverageCommercialSpeed
    - ExpectedPassengerCount
    - ExternalPassengerCount
    - TypeOfDelay
    - VehicleLoadEntry
    - PreparednessLevel
    - IndicatorFrame
  siri:
    - VehicleMonitoring
    - StopMonitoring
    - EstimatedTimetable
    - GeneralMessage
    - SituationExchange
    - FacilityMonitoring
    - ConnectionMonitoring
    - ConnectionTimetable
    - ProductionTimetable
    - StopTimetable
    - MonitoredVehicleJourney
    - EstimatedVehicleJourney
    - DatedVehicleJourney
  datex:
    - TrafficEvent
  transmodel:
    - Journey

allowlist_token:
  netex:
    - journey
    - line
    - network
    - destination
    - stop
    - operator
  opra:
    - delay
    - capacity
    - service
    - passenger
    - journey
    - vehicle
    - indicator
  siri:
    - vehicle
    - journey
    - stop
    - monitor
    - timetable
    - estimated
    - facility
    - connection
    - message
    - situation
  datex:
    - traffic
    - event
    - incident
    - situation

denylist_concept_ids:
  - netex:Line_Dummy
  - netex:Via_VersionedChildStructure
  - netex:NetworkView
  - netex:LineView
  - netex:DestinationDisplayView
