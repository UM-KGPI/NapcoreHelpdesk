namespaces:
  nch: http://napcore.example.org/ontology/nch

concepts:
  nch:journey:
    labels:
      - journey
      - transport journey
    related_to:
      - nch:vehicle-journey
      - nch:journey-pattern

  nch:vehicle-journey:
    labels:
      - vehicle journey
      - service journey
      - delayed journey
      - cancelled journey
    related_to:
      - nch:journey
      - nch:delay
      - nch:capacity
      - nch:service-intensity

  nch:journey-pattern:
    labels:
      - journey pattern
      - route pattern
    related_to:
      - nch:journey
      - nch:line

  nch:line:
    labels:
      - line
      - service line
    related_to:
      - nch:journey-pattern
      - nch:network

  nch:network:
    labels:
      - network
      - transport network
    related_to:
      - nch:line
      - nch:service-intensity

  nch:delay:
    labels:
      - delay
      - journey delay
      - delay statistics
      - type of delay
    related_to:
      - nch:vehicle-journey
      - nch:service-intensity

  nch:capacity:
    labels:
      - capacity
      - planned capacity
      - actual capacity
      - vehicle capacity
      - passenger capacity
    related_to:
      - nch:vehicle-journey
      - nch:service-intensity
      - nch:passenger-load

  nch:service-intensity:
    labels:
      - service intensity
      - planned service intensity
      - actual service intensity
      - expected service intensity
      - transport performance
    related_to:
      - nch:capacity
      - nch:network
      - nch:delay

  nch:passenger-load:
    labels:
      - passenger count
      - vehicle load
      - occupancy
    related_to:
      - nch:capacity
      - nch:service-intensity