services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: napcore-shared-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-napcore_helpdesk}
      POSTGRES_USER: ${POSTGRES_USER:-napcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-napcore}
    volumes:
      - shared-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-napcore} -d ${POSTGRES_DB:-napcore_helpdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  shared-postgres-data:
