<svg width="1100" height="750" xmlns="http://www.w3.org/2000/svg">
  <style>
    .uml-box {
      fill: #f7faff;
      stroke: #2b5fab;
      stroke-width: 1.8;
      rx: 12;
      ry: 12;
    }
    .uml-db {
      fill: #e8f0ff;
      stroke: #2b5fab;
      stroke-width: 1.8;
      rx: 12;
      ry: 12;
    }
    .title {
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: bold;
      fill: #1b2d55;
    }
    .label {
      font-family: Arial, sans-serif;
      font-size: 15px;
      fill: #1b2d55;
    }
    .arrow {
      stroke: #1b2d55;
      stroke-width: 2.8;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .swimlane-label {
      font-family: Arial, sans-serif;
      font-size: 16px;
      fill: #1b2d55;
      font-weight: bold;
    }
    .swimlane-line {
      stroke: #8aa3c8;
      stroke-width: 1.5;
      stroke-dasharray: 6 6;
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1b2d55"/>
    </marker>
  </defs>

  <text x="230" y="40" class="title">
    UML Activity Diagram - RAG Architecture for FAQ Helpdesk AI
  </text>

  <text x="100" y="80" class="swimlane-label">User</text>
  <line x1="200" y1="60" x2="200" y2="720" class="swimlane-line"/>

  <text x="450" y="80" class="swimlane-label">Application Layer</text>
  <line x1="700" y1="60" x2="700" y2="720" class="swimlane-line"/>

  <text x="820" y="80" class="swimlane-label">Data / AI Layer</text>

  <rect class="uml-box" x="90" y="120" width="200" height="70"/>
  <text class="label" x="140" y="160">User Query</text>

  <line class="arrow" x1="290" y1="155" x2="450" y2="155"/>

  <rect class="uml-box" x="450" y="120" width="220" height="70"/>
  <text class="label" x="480" y="160">Create Embeddings</text>

  <line class="arrow" x1="560" y1="190" x2="560" y2="260"/>

  <rect class="uml-box" x="450" y="260" width="220" height="70"/>
  <text class="label" x="480" y="300">Vector Search / Retrieval</text>

  <rect class="uml-db" x="760" y="260" width="260" height="70"/>
  <text class="label" x="800" y="300">FAQ Database (Structured)</text>

  <line class="arrow" x1="760" y1="295" x2="670" y2="295"/>

  <line class="arrow" x1="560" y1="330" x2="560" y2="400"/>

  <rect class="uml-box" x="450" y="400" width="220" height="70"/>
  <text class="label" x="495" y="440">LLM (AI Fallback)</text>

  <line class="arrow" x1="560" y1="470" x2="560" y2="550"/>

  <rect class="uml-box" x="450" y="550" width="220" height="70"/>
  <text class="label" x="510" y="590">Final Answer</text>

  <line class="arrow" x1="450" y1="585" x2="200" y2="585"/>
</svg>
