# Capability-Matrix: Benchmark Question Stratification by Intent and Tier

# This YAML defines which benchmark questions belong to each regression-testing tier
# (canary, stratified, full) and groups them by intent and standards coverage.
#
# Usage:
# - Canary: fast feedback during active development (5 reference questions, all intents)
# - Stratified: pre-merge validation (25–30 representative questions, balanced by intent)
# - Full: release-gate validation (all 100 questions)
#
# Reference: docs/testing/benchmark-regression-gates.md

version: "1.0"
generated: "2026-05-11"
baseline_report: "benchmark-graphrag-ab-2026-05-11.json"

# Tier 1: Canary (5 reference questions, one per intent)
# Used for commit-level feedback during development
canary:
  tier: "1-canary"
  tier_description: "Fast feedback during active development"
  target_runtime_seconds: 60
  pass_gates:
    - "execution"
    - "latency_p50"
    - "latency_p95"
    - "stage_concentration"
  questions:
    - id: "q070"
      intent: "example"
      standards: ["NeTEx"]
      rationale: "Reference for answer example queries (baseline slow: 13432.4 ms)"
    - id: "q080"
