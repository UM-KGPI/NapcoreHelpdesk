version: "1.0"
description: >
  P4 evaluation benchmark for the NAPCORE Helpdesk graph-RAG vs baseline
  comparison. 100 retrieval questions covering explanation, example,
  cross-standard mapping, disambiguation, and abstention intents. Used by the
  run_retrieval_benchmark management command to emit a hit@k / MRR report.
