services:
  backend:
    build: &id001
      context: ./backend
      dockerfile: Dockerfile
    command:
    - sh
    - -c
    - python manage.py migrate --noinput && gunicorn config.wsgi:application --bind
      0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -
    cpus: ${BACKEND_CPUS:-2.0}
    depends_on:
      db:
        condition: service_healthy
      graphdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: &id002
    - ./backend/.env.prod
    environment: &id003
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEV_JWT_AUTO_ISSUE: 'True'
      DJANGO_DEBUG: 'False'
      GRAPHDB_ENABLED: 'True'
      GRAPHDB_REPOSITORY: napcore-helpdesk
      GRAPHDB_SPARQL_ENDPOINT: http://graphdb:7200/repositories/napcore-helpdesk
      GRAPHDB_TIMEOUT_SECONDS: '30'
      ALLOWED_SOURCE_REPOSITORIES: https://github.com/TransmodelEcosystem/NeTEx,https://github.com/TransmodelEcosystem/SIRI,https://github.com/OpRa-CEN/OpRa
      LLM_MAX_TOKENS: '2000'
      NAPCORE_ONTOLOGY_DIR: /app/ontology
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:8000/api/v1/health/live
      timeout: 10s
    mem_limit: ${BACKEND_MEM_LIMIT:-3g}
    restart: unless-stopped
    volumes:
    - ./docs:/app/docs:ro
    - /opt/napcore-helpdesk/ontology:/app/ontology:ro
    - /opt/napcore-helpdesk/repos:/app/repos:ro
    - /opt/napcore-helpdesk/VERSION:/app/VERSION:ro
    working_dir: /app/backend
  celery-beat:
    build: *id001
    command:
    - celery
    - -A
    - config
    - beat
    - -l
    - info
    cpus: ${CELERY_BEAT_CPUS:-0.5}
    depends_on: &id004
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: *id002
    environment: *id003
    mem_limit: ${CELERY_BEAT_MEM_LIMIT:-512m}
    restart: unless-stopped
    volumes:
    - ./docs:/app/docs:ro
    - /opt/napcore-helpdesk/ontology:/app/ontology:ro
    - /opt/napcore-helpdesk/repos:/app/repos:ro
    - /opt/napcore-helpdesk/VERSION:/app/VERSION:ro
    working_dir: /app/backend
  celery-worker:
    build: *id001
    command:
    - celery
    - -A
    - config
    - worker
    - -l
    - info
    cpus: ${CELERY_WORKER_CPUS:-1.5}
    depends_on: *id004
    env_file: *id002
    environment: *id003
    mem_limit: ${CELERY_WORKER_MEM_LIMIT:-2g}
    restart: unless-stopped
    volumes:
    - ./docs:/app/docs:ro
    - /opt/napcore-helpdesk/ontology:/app/ontology:ro
    - /opt/napcore-helpdesk/repos:/app/repos:ro
    - /opt/napcore-helpdesk/VERSION:/app/VERSION:ro
    working_dir: /app/backend
  db:
    env_file:
    - ./backend/.env.prod
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-napcore} -d ${POSTGRES_DB:-napcore_helpdesk}
      timeout: 5s
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    volumes:
    - postgres-data:/var/lib/postgresql/data
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    cpus: ${FRONTEND_CPUS:-0.5}
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: ${FRONTEND_MEM_LIMIT:-256m}
    ports:
    - 8080:80
    restart: unless-stopped
  graphdb:
    cpus: ${GRAPHDB_CPUS:-2.0}
    environment:
      GDB_JAVA_OPTS: -Xms${GRAPHDB_HEAP_MIN:-2g} -Xmx${GRAPHDB_HEAP_MAX:-4g}
    healthcheck:
      interval: 15s
      retries: 10
      start_period: 60s
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:7200/rest/repositories
      timeout: 10s
    image: ${GRAPHDB_IMAGE:-ontotext/graphdb:11.3.3}
    mem_limit: ${GRAPHDB_MEM_LIMIT:-6g}
    restart: unless-stopped
    volumes:
    - graphdb-data:/opt/graphdb/home
    - /opt/napcore-helpdesk/secrets/graphdb.license:/opt/graphdb/home/conf/graphdb.license:ro
  redis:
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD
      - redis-cli
      - ping
      timeout: 3s
    image: redis:7-alpine
    restart: unless-stopped
volumes:
  graphdb-data: null
  postgres-data: null
x-backend-base:
  build: *id001
  depends_on: *id004
  env_file: *id002
  environment: *id003
  restart: unless-stopped
  working_dir: /app/backend
