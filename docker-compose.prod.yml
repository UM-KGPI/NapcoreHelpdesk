x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  restart: unless-stopped
  working_dir: /app/backend
  env_file:
    - ./backend/.env.prod
  environment: &backend-env
    DJANGO_DEBUG: "False"
    POSTGRES_HOST: db
    POSTGRES_PORT: "5432"
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    GRAPHDB_SPARQL_ENDPOINT: http://graphdb:7200/repositories/napcore-helpdesk
    GRAPHDB_REPOSITORY: napcore-helpdesk
    GRAPHDB_TIMEOUT_SECONDS: "30"
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-napcore} -d ${POSTGRES_DB:-napcore_helpdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    <<: *backend-base
    command: ["sh", "-c", "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -"]
    volumes:
      - ./docs:/app/docs:ro
      - /opt/napcore-helpdesk/ontology:/app/ontology:ro
      - /opt/napcore-helpdesk/VERSION:/app/VERSION:ro
    mem_limit: ${BACKEND_MEM_LIMIT:-3g}
    cpus: ${BACKEND_CPUS:-2.0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      graphdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-worker:
    <<: *backend-base
    command: celery -A config worker -l info
    volumes:
      - ./docs:/app/docs:ro
      - /opt/napcore-helpdesk/ontology:/app/ontology:ro
      - /opt/napcore-helpdesk/VERSION:/app/VERSION:ro
    mem_limit: ${CELERY_WORKER_MEM_LIMIT:-2g}
    cpus: ${CELERY_WORKER_CPUS:-1.5}

  celery-beat:
    <<: *backend-base
    command: celery -A config beat -l info
    volumes:
      - ./docs:/app/docs:ro
      - /opt/napcore-helpdesk/ontology:/app/ontology:ro
      - /opt/napcore-helpdesk/VERSION:/app/VERSION:ro
    mem_limit: ${CELERY_BEAT_MEM_LIMIT:-512m}
    cpus: ${CELERY_BEAT_CPUS:-0.5}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: ${FRONTEND_MEM_LIMIT:-256m}
    cpus: ${FRONTEND_CPUS:-0.5}

  graphdb:
    image: ${GRAPHDB_IMAGE:-ontotext/graphdb:11.3.3}
    restart: unless-stopped
    environment:
      GDB_JAVA_OPTS: >-
        -Xms${GRAPHDB_HEAP_MIN:-2g}
        -Xmx${GRAPHDB_HEAP_MAX:-4g}
    volumes:
      - graphdb-data:/opt/graphdb/home
      - /opt/napcore-helpdesk/secrets/graphdb.license:/opt/graphdb/home/conf/graphdb.license:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7200/rest/repositories"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    mem_limit: ${GRAPHDB_MEM_LIMIT:-6g}
    cpus: ${GRAPHDB_CPUS:-2.0}

volumes:
  postgres-data:
  graphdb-data:
