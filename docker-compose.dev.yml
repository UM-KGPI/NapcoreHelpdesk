x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: Dockerfile.dev

x-backend-base: &backend-base
  <<: *backend-build
  restart: unless-stopped
  working_dir: /app/backend
  env_file:
    - ./backend/.env
  environment: &backend-env
    DJANGO_SECRET_KEY: docker-dev-secret-key
    DJANGO_DEBUG: "True"
    DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
    POSTGRES_DB: napcore_helpdesk
    POSTGRES_USER: napcore
    POSTGRES_PASSWORD: napcore
    POSTGRES_HOST: db
    POSTGRES_PORT: "5432"
    JWT_SECRET_KEY: docker-dev-jwt-secret-key
    JWT_ALGORITHM: HS256
    DEV_JWT_AUTO_ISSUE: "True"
    DEV_JWT_DEFAULT_SUBJECT: user-local
    DEV_JWT_DEFAULT_ROLES: editor,reviewer,publisher
    DEV_JWT_TTL_MINUTES: "480"
    ALLOWED_SOURCE_REPOSITORIES: https://github.com/TransmodelEcosystem/NeTEx,https://github.com/SIRI-CEN/SIRI,https://github.com/OpRa-CEN/OpRa
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    GRAPHDB_ENABLED: ${GRAPHDB_ENABLED:-True}
    GRAPHDB_SPARQL_ENDPOINT: http://graphdb:7200/repositories/napcore-helpdesk
    GRAPHDB_REPOSITORY: napcore-helpdesk
    GRAPHDB_TIMEOUT_SECONDS: "30"
    GRAPH_RAG_ENABLED: ${GRAPH_RAG_ENABLED:-True}
    LLM_ENABLED: ${LLM_ENABLED:-True}
    LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
    CONTROLLER_LLM_ENABLED: ${CONTROLLER_LLM_ENABLED:-True}
    CONTROLLER_LLM_PROVIDER: ${CONTROLLER_LLM_PROVIDER:-openai-compatible}
    CONTROLLER_LLM_VERIFY_SSL: ${CONTROLLER_LLM_VERIFY_SSL:-False}
    CONTROLLER_LLM_CA_BUNDLE: ${CONTROLLER_LLM_CA_BUNDLE:-}
    CONTROLLER_LLM_TIMEOUT_SECONDS: ${CONTROLLER_LLM_TIMEOUT_SECONDS:-20}
    EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-False}
    EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai-compatible}
    EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-https://api.openai.com/v1}
    EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
    EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}

services:
  db:
    image: pgvector/pgvector:pg17
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: napcore_helpdesk
      POSTGRES_USER: napcore
      POSTGRES_PASSWORD: napcore
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U napcore -d napcore_helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    <<: *backend-base
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    mem_limit: ${BACKEND_MEM_LIMIT:-3g}
    cpus: ${BACKEND_CPUS:-2.0}
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs:ro
      - ./scripts:/app/scripts:ro
      - ../NeTEx:/app/repos/NeTEx:ro
      - ../OpRa:/app/repos/OpRa:ro
      - ../SIRI:/app/repos/SIRI:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      graphdb:
        condition: service_healthy

  celery-worker:
    <<: *backend-base
    command: celery -A config worker -l info
    mem_limit: ${CELERY_WORKER_MEM_LIMIT:-2g}
    cpus: ${CELERY_WORKER_CPUS:-1.5}
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs:ro
    depends_on:
      backend:
        condition: service_started

  celery-beat:
    <<: *backend-base
    command: celery -A config beat -l info
    mem_limit: ${CELERY_BEAT_MEM_LIMIT:-512m}
    cpus: ${CELERY_BEAT_CPUS:-0.5}
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs:ro
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    working_dir: /app/frontend
    environment:
      VITE_BACKEND_ORIGIN: http://backend:8000
      VITE_APP_VERSION: ${VITE_APP_VERSION:-}
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    mem_limit: ${FRONTEND_MEM_LIMIT:-1g}
    cpus: ${FRONTEND_CPUS:-1.0}

  graphdb:
    image: ${GRAPHDB_IMAGE:-ontotext/graphdb:11.3.3}
    restart: unless-stopped
    ports:
      - "7200:7200"
    environment:
      GDB_JAVA_OPTS: >-
        -Xms${GRAPHDB_HEAP_MIN:-1g}
        -Xmx${GRAPHDB_HEAP_MAX:-1g}
    volumes:
      - graphdb-data:/opt/graphdb/home
      - ./secrets/graphdb.license:/opt/graphdb/home/conf/graphdb.license:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7200/rest/repositories"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    mem_limit: ${GRAPHDB_MEM_LIMIT:-4g}
    cpus: ${GRAPHDB_CPUS:-2.0}

  controller-llm:
    profiles: ["controller-llm"]
    image: ${CONTROLLER_LLM_SERVER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-b8400}
    restart: unless-stopped
    command:
      - -m
      - ${CONTROLLER_LLM_SERVER_MODEL_PATH:-/models/qwen3-8b/Qwen3-8B-Q4_K_M.gguf}
      - -c
      - ${CONTROLLER_LLM_SERVER_CTX_SIZE:-1024}
      - -t
      - ${CONTROLLER_LLM_SERVER_THREADS:-6}
      - -np
      - ${CONTROLLER_LLM_SERVER_PARALLEL:-1}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --jinja
      - --reasoning-format
      - none
    volumes:
      - ${LLAMA_CPP_HOST_ROOT:-/Users/andrejt/Research/repositories/git/llama.cpp}/models:/models:ro
    expose:
      - "8080"
    mem_limit: ${CONTROLLER_LLM_MEM_LIMIT:-12g}
    cpus: ${CONTROLLER_LLM_CPUS:-3.0}

volumes:
  postgres-data:
  frontend-node-modules:
  graphdb-data:
