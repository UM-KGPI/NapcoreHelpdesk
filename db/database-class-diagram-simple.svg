<svg width="1520" height="900" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      fill: #1f2f4a;
    }
    .subtitle {
      font-family: Arial, sans-serif;
      font-size: 14px;
      fill: #4f6482;
    }
    .entity {
      fill: #f8fbff;
      stroke: #2b5fab;
      stroke-width: 1.8;
      rx: 10;
      ry: 10;
    }
    .entity-header {
      fill: #dce9ff;
      stroke: #2b5fab;
      stroke-width: 1.8;
      rx: 10;
      ry: 10;
    }
    .header-text {
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      fill: #17335c;
    }
    .field-text {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      fill: #1f2f4a;
    }
    .field-pk {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      fill: #9a6700;
    }
    .field-fk {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      fill: #0c6b58;
    }
    .relation {
      stroke: #38598a;
      stroke-width: 2;
      fill: none;
    }
    .relation-optional {
      stroke: #5a7cab;
      stroke-width: 2;
      stroke-dasharray: 7 5;
      fill: none;
    }
    .note {
      fill: #fff9e6;
      stroke: #b08a1d;
      stroke-width: 1.4;
      rx: 8;
      ry: 8;
    }
    .note-text {
      font-family: Arial, sans-serif;
      font-size: 13px;
      fill: #6f5410;
    }
  </style>

  <defs>
    <marker id="simple-one" viewBox="0 0 12 14" refX="0" refY="7" markerWidth="12" markerHeight="14" orient="auto-start-reverse">
      <path d="M 4 1 L 4 13" stroke="#38598a" stroke-width="1.7" fill="none"/>
    </marker>
    <marker id="simple-many" viewBox="0 0 16 14" refX="0" refY="7" markerWidth="16" markerHeight="14" orient="auto-start-reverse">
      <path d="M 0 7 L 12 1 M 0 7 L 12 7 M 0 7 L 12 13" stroke="#38598a" stroke-width="1.5" fill="none"/>
    </marker>
    <marker id="simple-zeroone" viewBox="0 0 18 14" refX="0" refY="7" markerWidth="18" markerHeight="14" orient="auto-start-reverse">
      <circle cx="4" cy="7" r="2.4" stroke="#5a7cab" stroke-width="1.4" fill="#ffffff"/>
      <path d="M 11 1 L 11 13" stroke="#5a7cab" stroke-width="1.6" fill="none"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">Simplified Database Diagram - Presentation View</text>
  <text x="40" y="68" class="subtitle">Core entities only; retrieval_events and review_events are omitted for clarity</text>

  <g transform="translate(80,120)">
    <rect class="entity" width="300" height="140"/>
    <rect class="entity-header" width="300" height="40"/>
    <text x="16" y="26" class="header-text">approved_repositories</text>
    <text x="16" y="66" class="field-pk">+ id [PK]</text>
    <text x="16" y="86" class="field-text">+ repository_url</text>
    <text x="16" y="106" class="field-text">+ default_ref</text>
  </g>

  <g transform="translate(470,120)">
    <rect class="entity" width="300" height="160"/>
    <rect class="entity-header" width="300" height="40"/>
    <text x="16" y="26" class="header-text">source_documents</text>
    <text x="16" y="66" class="field-pk">+ id [PK]</text>
    <text x="16" y="86" class="field-fk">+ repository_id [FK]</text>
    <text x="16" y="106" class="field-text">+ source_path</text>
    <text x="16" y="126" class="field-text">+ commit_sha</text>
  </g>

  <g transform="translate(860,120)">
    <rect class="entity" width="300" height="160"/>
    <rect class="entity-header" width="300" height="40"/>
    <text x="16" y="26" class="header-text">source_chunks</text>
    <text x="16" y="66" class="field-pk">+ id [PK]</text>
    <text x="16" y="86" class="field-fk">+ document_id [FK]</text>
    <text x="16" y="106" class="field-text">+ chunk_text</text>
    <text x="16" y="126" class="field-text">+ citation_label</text>
  </g>

  <g transform="translate(80,470)">
    <rect class="entity" width="320" height="160"/>
    <rect class="entity-header" width="320" height="40"/>
    <text x="16" y="26" class="header-text">question_events</text>
    <text x="16" y="66" class="field-pk">+ id [PK]</text>
    <text x="16" y="86" class="field-fk">+ matched_faq_entry_id [FK]</text>
    <text x="16" y="106" class="field-text">+ raw_question</text>
    <text x="16" y="126" class="field-text">+ answer_mode</text>
  </g>

  <g transform="translate(460,470)">
    <rect class="entity" width="300" height="160"/>
    <rect class="entity-header" width="300" height="40"/>
    <text x="16" y="26" class="header-text">faq_entries</text>
    <text x="16" y="66" class="field-pk">+ id [PK]</text>
    <text x="16" y="86" class="field-fk">+ current_version_id [FK]</text>
    <text x="16" y="106" class="field-text">+ canonical_question</text>
    <text x="16" y="126" class="field-text">+ status</text>
  </g>

  <g transform="translate(840,470)">
    <rect class="entity" width="300" height="180"/>
    <rect class="entity-header" width="300" height="40"/>
    <text x="16" y="26" class="header-text">faq_versions</text>
    <text x="16" y="66" class="field-pk">+ id [PK]</text>
    <text x="16" y="86" class="field-fk">+ faq_entry_id [FK]</text>
    <text x="16" y="106" class="field-text">+ answer_markdown</text>
    <text x="16" y="126" class="field-text">+ confidence_score</text>
    <text x="16" y="146" class="field-text">+ has_complete_citations</text>
  </g>

  <g transform="translate(1180,430)">
    <rect class="entity" width="300" height="220"/>
    <rect class="entity-header" width="300" height="40"/>
    <text x="16" y="26" class="header-text">answer_evidence_links</text>
    <text x="16" y="66" class="field-pk">+ id [PK]</text>
    <text x="16" y="86" class="field-fk">+ faq_version_id [FK]</text>
    <text x="16" y="106" class="field-fk">+ question_event_id [FK]</text>
    <text x="16" y="126" class="field-fk">+ source_chunk_id [FK]</text>
    <text x="16" y="146" class="field-text">+ claim_label</text>
  </g>

  <g transform="translate(1180,120)">
    <rect class="note" width="300" height="170"/>
    <text x="16" y="34" class="header-text">Legend</text>
    <text x="16" y="68" class="note-text">Gold: primary key</text>
    <text x="16" y="88" class="note-text">Green: foreign key</text>
    <text x="16" y="118" class="note-text">Crow's-foot notation used</text>
    <text x="16" y="138" class="note-text">No connector crosses a class box</text>
  </g>

  <line class="relation" x1="380" y1="200" x2="470" y2="200" marker-start="url(#simple-one)" marker-end="url(#simple-many)"/>
  <line class="relation" x1="770" y1="210" x2="860" y2="210" marker-start="url(#simple-one)" marker-end="url(#simple-many)"/>
  <line class="relation-optional" x1="400" y1="540" x2="460" y2="540" marker-start="url(#simple-many)" marker-end="url(#simple-zeroone)"/>
  <line class="relation" x1="760" y1="560" x2="840" y2="560" marker-start="url(#simple-one)" marker-end="url(#simple-many)"/>
  <line class="relation" x1="1140" y1="560" x2="1180" y2="560" marker-start="url(#simple-one)" marker-end="url(#simple-many)"/>
  <line class="relation-optional" x1="400" y1="520" x2="460" y2="520" marker-start="url(#simple-many)" marker-end="url(#simple-zeroone)"/>
  <path class="relation-optional" d="M 400 590 L 400 720 L 1310 720 L 1310 650" marker-start="url(#simple-zeroone)" marker-end="url(#simple-many)"/>
  <path class="relation" d="M 1010 280 L 1010 360 L 1180 360 L 1180 430" marker-start="url(#simple-one)" marker-end="url(#simple-many)"/>
  <text x="1030" y="348" class="note-text">source_chunk_id</text>

  <text x="40" y="850" class="subtitle">This presentation view keeps only the main knowledge-boundary, FAQ, question, and evidence entities.</text>
</svg>